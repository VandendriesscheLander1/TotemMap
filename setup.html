<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TotemMap Calibration</title>
<style>
  html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; background: #111; color: #ddd; }
  #app { display: grid; grid-template-columns: 1fr 360px; height: 100vh; }
  #mapWrap { position: relative; overflow: hidden; background: #000; cursor: crosshair; }
  #mapCanvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; image-rendering: pixelated; }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; transform-origin: 0 0; }
  #panel { padding: 12px; overflow-y: auto; border-left: 1px solid #333; background: #1a1a1a; }
  h2 { font-size: 14px; margin: 12px 0 6px; color: #9cf; text-transform: uppercase; letter-spacing: 0.05em; }
  #drop { border: 2px dashed #444; padding: 16px; text-align: center; border-radius: 6px; color: #888; }
  #drop.hover { border-color: #9cf; color: #9cf; }
  .row { display: flex; gap: 6px; margin: 4px 0; }
  button { background: #2a2a2a; color: #ddd; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
  button:hover { background: #333; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  ul { list-style: none; padding: 0; margin: 0; }
  li { padding: 6px 8px; border: 1px solid #333; border-radius: 4px; margin-bottom: 4px; font-size: 12px; cursor: pointer; }
  li.sel { border-color: #9cf; background: #1f2a36; }
  li .meta { color: #888; font-size: 11px; }
  li .err { color: #f88; }
  .num { color: #ffb; font-variant-numeric: tabular-nums; }
  #result { white-space: pre; font-family: ui-monospace, monospace; font-size: 12px; background: #0c0c0c; padding: 8px; border-radius: 4px; }
  #hud { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-family: ui-monospace, monospace; pointer-events: none; }
</style>
</head>
<body>
<div id="app">
  <div id="mapWrap">
    <canvas id="mapCanvas"></canvas>
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="hud">load map…</div>
  </div>
  <div id="panel">
    <h2>Map</h2>
    <div class="row">
      <input type="file" id="mapFile" accept="image/png,image/jpeg" />
    </div>
    <div class="meta" style="font-size:11px;color:#888">Default: stitched_final.png (auto-loaded if reachable)</div>

    <h2>Add screenshots</h2>
    <div id="drop">Drop Soulframe*.jpg here<br/><span style="font-size:11px">(or click to pick)</span>
      <input type="file" id="fileInput" accept="image/jpeg" multiple style="display:none" />
    </div>

    <h2>Calibration points</h2>
    <ul id="points"></ul>
    <div class="meta" style="font-size:11px;color:#888">Select a row, then click the map to set its pixel.</div>

    <h2>Fit</h2>
    <div class="row">
      <button id="fitBtn">Fit transform</button>
      <button id="exportBtn">Export JSON</button>
    </div>
    <div class="row">
      <button id="loadBtn">Load calibration.json</button>
      <input type="file" id="loadFile" accept="application/json" style="display:none" />
    </div>
    <div id="result">(no fit yet)</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
<script>
const mapWrap = document.getElementById('mapWrap');
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const hud = document.getElementById('hud');
const pointsEl = document.getElementById('points');
const resultEl = document.getElementById('result');

let mapImg = null;
let view = { x: 0, y: 0, scale: 0.12 };
let points = []; // { file, game:[x,z], pixel:[px,py]|null, comment }
let selected = -1;
let transform = null;

// ---------- map load ----------
function loadMapFromUrl(url) {
  const img = new Image();
  img.onload = () => {
    mapImg = img;
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    overlay.setAttribute('width', img.naturalWidth);
    overlay.setAttribute('height', img.naturalHeight);
    overlay.setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
    ctx.drawImage(img, 0, 0);
    fitView();
    redrawOverlay();
  };
  img.onerror = () => { hud.textContent = 'failed to load ' + url; };
  img.src = url;
}
loadMapFromUrl('stitched_final.png');

document.getElementById('mapFile').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadMapFromUrl(URL.createObjectURL(f));
});

function fitView() {
  const wrap = mapWrap.getBoundingClientRect();
  const s = Math.min(wrap.width / canvas.width, wrap.height / canvas.height);
  view.scale = s;
  view.x = (wrap.width - canvas.width * s) / 2;
  view.y = (wrap.height - canvas.height * s) / 2;
  applyView();
}
function applyView() {
  const t = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
  canvas.style.transform = t;
  overlay.style.transform = t;
}

// ---------- pan / zoom ----------
let dragging = false, dragStart = null, didDrag = false;
mapWrap.addEventListener('mousedown', e => {
  dragging = true; didDrag = false;
  dragStart = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y };
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (Math.abs(dx) + Math.abs(dy) > 3) didDrag = true;
  view.x = dragStart.vx + dx;
  view.y = dragStart.vy + dy;
  applyView();
});
window.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  if (!didDrag) handleClick(e);
});
mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = mapWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = Math.exp(-e.deltaY * 0.001);
  const ns = Math.max(0.02, Math.min(8, view.scale * factor));
  view.x = mx - (mx - view.x) * (ns / view.scale);
  view.y = my - (my - view.y) * (ns / view.scale);
  view.scale = ns;
  applyView();
}, { passive: false });

function clientToPixel(cx, cy) {
  const rect = mapWrap.getBoundingClientRect();
  return [(cx - rect.left - view.x) / view.scale, (cy - rect.top - view.y) / view.scale];
}
function handleClick(e) {
  if (!mapImg) return;
  const [px, py] = clientToPixel(e.clientX, e.clientY);
  if (px < 0 || py < 0 || px > canvas.width || py > canvas.height) return;
  if (selected < 0) { hud.textContent = 'select a point in the list first'; return; }
  points[selected].pixel = [px, py];
  renderPoints();
  redrawOverlay();
}
mapWrap.addEventListener('mousemove', e => {
  if (!mapImg) return;
  const [px, py] = clientToPixel(e.clientX, e.clientY);
  hud.textContent = `px ${px.toFixed(1)}, ${py.toFixed(1)}   zoom ${view.scale.toFixed(3)}`;
});

// ---------- file drop / EXIF ----------
const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFiles(e.target.files));
;['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('hover'); }));
;['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('hover'); }));
drop.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

async function handleFiles(files) {
  for (const f of files) {
    try {
      const comment = await readJpegComment(f);
      const m = comment && comment.match(/P:\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)/);
      if (!m) { addPoint({ file: f.name, game: null, pixel: null, comment, error: 'no P: coord' }); continue; }
      addPoint({ file: f.name, game: [parseFloat(m[1]), parseFloat(m[3])], pixel: null, comment });
    } catch (err) {
      addPoint({ file: f.name, game: null, pixel: null, comment: '', error: String(err) });
    }
  }
}

async function readJpegComment(file) {
  // Try exifr first
  try {
    const meta = await exifr.parse(file, { userComment: true, ifd0: true, xmp: false });
    if (meta) {
      const cand = meta.UserComment || meta.userComment || meta.ImageDescription || meta.Comment;
      if (cand && /P:/.test(typeof cand === 'string' ? cand : '')) return cand;
    }
  } catch {}
  // Fallback: scan COM marker (0xFFFE) in the JPEG ourselves
  const buf = new Uint8Array(await file.arrayBuffer());
  if (buf[0] !== 0xFF || buf[1] !== 0xD8) throw new Error('not a JPEG');
  let i = 2;
  while (i < buf.length - 4) {
    if (buf[i] !== 0xFF) break;
    const marker = buf[i + 1];
    if (marker === 0xD8 || marker === 0xD9) { i += 2; continue; }
    const len = (buf[i + 2] << 8) | buf[i + 3];
    if (marker === 0xFE) {
      const bytes = buf.subarray(i + 4, i + 2 + len);
      return new TextDecoder('utf-8', { fatal: false }).decode(bytes);
    }
    if (marker === 0xDA) break; // start of scan
    i += 2 + len;
  }
  return '';
}

function addPoint(p) {
  points.push(p);
  if (selected < 0) selected = points.length - 1;
  renderPoints();
}

// ---------- list rendering ----------
function renderPoints() {
  pointsEl.innerHTML = '';
  points.forEach((p, i) => {
    const li = document.createElement('li');
    if (i === selected) li.classList.add('sel');
    const g = p.game ? `g(<span class="num">${p.game[0].toFixed(2)}</span>, <span class="num">${p.game[1].toFixed(2)}</span>)` : '<span class="err">no game</span>';
    const px = p.pixel ? `px(<span class="num">${p.pixel[0].toFixed(0)}</span>, <span class="num">${p.pixel[1].toFixed(0)}</span>)` : '<span style="color:#fa6">click map to set px</span>';
    let resid = '';
    if (transform && p.game && p.pixel) {
      const [qx, qy] = applyT(transform, p.game[0], p.game[1]);
      const d = Math.hypot(qx - p.pixel[0], qy - p.pixel[1]);
      resid = ` <span class="meta">Δ${d.toFixed(1)}px</span>`;
    }
    li.innerHTML = `<b>${i + 1}.</b> ${p.file}<br><span class="meta">${g} → ${px}${resid}</span>`
      + (p.error ? `<br><span class="err">${p.error}</span>` : '')
      + `<div class="row" style="margin-top:4px"><button data-act="del" data-i="${i}">remove</button>${p.pixel ? `<button data-act="clearpx" data-i="${i}">clear px</button>` : ''}</div>`;
    li.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') return;
      selected = i; renderPoints(); redrawOverlay();
    });
    pointsEl.appendChild(li);
  });
  pointsEl.querySelectorAll('button').forEach(b => b.addEventListener('click', e => {
    const i = +b.dataset.i;
    if (b.dataset.act === 'del') { points.splice(i, 1); if (selected >= points.length) selected = points.length - 1; }
    else if (b.dataset.act === 'clearpx') { points[i].pixel = null; }
    renderPoints(); redrawOverlay();
  }));
}

function redrawOverlay() {
  let svg = '';
  points.forEach((p, i) => {
    if (!p.pixel) return;
    const [x, y] = p.pixel;
    const r = 14;
    const col = i === selected ? '#9cf' : '#fc6';
    svg += `<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="${col}" stroke-width="3"/>`;
    svg += `<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>`;
    svg += `<text x="${x + r + 4}" y="${y + 6}" fill="${col}" font-size="24" font-family="monospace">${i + 1}</text>`;
  });
  if (transform) {
    points.forEach((p, i) => {
      if (!p.game) return;
      const [qx, qy] = applyT(transform, p.game[0], p.game[1]);
      svg += `<circle cx="${qx}" cy="${qy}" r="6" fill="none" stroke="#6f6" stroke-width="2" stroke-dasharray="3 3"/>`;
      if (p.pixel) svg += `<line x1="${qx}" y1="${qy}" x2="${p.pixel[0]}" y2="${p.pixel[1]}" stroke="#6f6" stroke-width="1"/>`;
    });
  }
  overlay.innerHTML = svg;
}

// ---------- fit (affine, least squares) ----------
// px = a*gx + b*gz + tx
// py = c*gx + d*gz + ty
function fitAffine(pts) {
  const n = pts.length;
  if (n < 3) throw new Error('need at least 3 points');
  let gxm = 0, gzm = 0, pxm = 0, pym = 0;
  for (const { g, p } of pts) { gxm += g[0]; gzm += g[1]; pxm += p[0]; pym += p[1]; }
  gxm /= n; gzm /= n; pxm /= n; pym /= n;
  let Sxx = 0, Szz = 0, Sxz = 0, SxPx = 0, SzPx = 0, SxPy = 0, SzPy = 0;
  for (const { g, p } of pts) {
    const gx = g[0] - gxm, gz = g[1] - gzm;
    const px = p[0] - pxm, py = p[1] - pym;
    Sxx += gx * gx; Szz += gz * gz; Sxz += gx * gz;
    SxPx += gx * px; SzPx += gz * px;
    SxPy += gx * py; SzPy += gz * py;
  }
  const det = Sxx * Szz - Sxz * Sxz;
  if (Math.abs(det) < 1e-9) throw new Error('degenerate: game points are collinear or coincident');
  const a = ( Szz * SxPx - Sxz * SzPx) / det;
  const b = (-Sxz * SxPx + Sxx * SzPx) / det;
  const c = ( Szz * SxPy - Sxz * SzPy) / det;
  const d = (-Sxz * SxPy + Sxx * SzPy) / det;
  const tx = pxm - (a * gxm + b * gzm);
  const ty = pym - (c * gxm + d * gzm);
  return { a, b, c, d, tx, ty };
}
function applyT(T, gx, gz) {
  return [T.a * gx + T.b * gz + T.tx, T.c * gx + T.d * gz + T.ty];
}
function rmsError(T, pts) {
  let s = 0;
  for (const { g, p } of pts) {
    const [qx, qy] = applyT(T, g[0], g[1]);
    s += (qx - p[0]) ** 2 + (qy - p[1]) ** 2;
  }
  return Math.sqrt(s / pts.length);
}

document.getElementById('fitBtn').addEventListener('click', () => {
  const usable = points.filter(p => p.game && p.pixel).map(p => ({ g: p.game, p: p.pixel }));
  if (usable.length < 3) { resultEl.textContent = 'need ≥3 points with both game + pixel'; return; }
  try {
    transform = fitAffine(usable);
    const rms = rmsError(transform, usable);
    const det = transform.a * transform.d - transform.b * transform.c;
    resultEl.textContent =
      `a  = ${transform.a.toFixed(6)}   b  = ${transform.b.toFixed(6)}\n` +
      `c  = ${transform.c.toFixed(6)}   d  = ${transform.d.toFixed(6)}\n` +
      `tx = ${transform.tx.toFixed(3)}\n` +
      `ty = ${transform.ty.toFixed(3)}\n` +
      `\n` +
      `det = ${det.toFixed(4)}  ${det < 0 ? '(reflected)' : ''}\n` +
      `RMS err = ${rms.toFixed(2)} px  (n=${usable.length})`;
    renderPoints();
    redrawOverlay();
  } catch (e) {
    resultEl.textContent = 'fit failed: ' + e.message;
  }
});

// ---------- export / import ----------
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!transform) { alert('fit first'); return; }
  const usable = points.filter(p => p.game && p.pixel);
  const data = {
    mapImage: 'stitched_final.png',
    mapSize: [canvas.width, canvas.height],
    transform,
    fittedAt: new Date().toISOString(),
    pointCount: usable.length,
    rmsErrorPx: rmsError(transform, usable.map(p => ({ g: p.game, p: p.pixel }))),
    points: usable.map(p => ({ file: p.file, game: p.game, pixel: p.pixel })),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'calibration.json';
  a.click();
});

document.getElementById('loadBtn').addEventListener('click', () => document.getElementById('loadFile').click());
document.getElementById('loadFile').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  const data = JSON.parse(await f.text());
  points = (data.points || []).map(p => ({ file: p.file, game: p.game, pixel: p.pixel, comment: '' }));
  transform = data.transform || null;
  selected = points.length ? 0 : -1;
  renderPoints();
  redrawOverlay();
  if (transform) document.getElementById('fitBtn').click();
});

window.addEventListener('resize', () => { /* keep current view, just re-apply */ applyView(); });
renderPoints();
</script>
</body>
</html>
